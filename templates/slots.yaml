# Slot definitions for content engine templates
# Coordinates are in SVG viewBox units (viewBox 810×1440).
# Positions extracted from filled reference SVGs.

story/dark-01:
  format: story
  dimensions: { width: 1080, height: 1920 }
  viewbox: { width: 810, height: 1440 }
  theme: dark
  background: "#353535"
  slots:
    logo:
      type: image
      x: 466
      y: 310
      width: 169
      height: 49
      static: true                   # always rendered, not dynamic
      src: "assets/logo-propertyiq.png"
    title:
      type: text
      x: 76
      y: 450
      max_width: 660
      font_family: "Inter"
      font_weight: 700
      font_size: 44
      color: "#FFFFFF"
      line_height: 1.2
      max_lines: 3
    chart:
      type: image
      x: 76
      y: 873
      width: 658
      height: 200
    chart_highlight:
      type: overlay
      ref: "chart-highlight-gold"
      anchor: chart
      offset_x: -10
      offset_y: -10
      width: 678
      height: 220
      z_index: -1                    # behind chart
    body:
      type: text
      x: 76
      y: 1120
      max_width: 658
      font_family: "Inter"
      font_weight: 400
      font_size: 22
      color: "#CCCCCC"
      line_height: 1.5
      max_lines: 6
    branding:
      type: text
      x: 76
      y: 1380
      max_width: 300
      font_family: "Inter"
      font_weight: 600
      font_size: 20
      color: "#CEAD63"
      text: "propertyiq.ae"
